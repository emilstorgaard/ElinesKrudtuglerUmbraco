services:
  umbraco:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elines-krudtugler-umbraco
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "8580:8080"
    volumes:
      - umbraco-media:/app/wwwroot/media
      - umbraco-logs:/app/umbraco/Logs
    networks:
      - mssql-network

networks:
  mssql-network:
    external: true
    name: mssql_default

volumes:
  umbraco-media:
  umbraco-logs: